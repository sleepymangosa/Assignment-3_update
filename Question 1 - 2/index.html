<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Responsive design -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Meta Tags -->

    <meta name="description" content="Simple calculator web app that performs sum, product, difference and
    division of two numbers. Accessible and user-friendly.">
    <meta name="keywords" content="calculator, web app, JavaScript calculator, math tool, accessible calculator">
    <meta name="Nyakama Mahle" content="DO4SA">
    
    <title>Accessible Calculator | DO4SA</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Skip link for keyboard users -->
    <a href="#main" class="skip-link">Skip to main content</a>

<!-- Main content -->
<main id="main" class="container" role="main">

    <!-- Page heading -->
    <h1>Accessible Calculator</h1>

    <!-- Label improves accessibility -->
    <label for="num1">First Number:</label>
    <input id="num1" type="number" placeholder="Enter first number" aria-required="true">

    <label for="num2">Second Number:</label>
    <input id="num2" type="number" placeholder="Enter second number" aria-required="true">

    <!-- Accessible button -->
    <button onclick="calculate()" aria-label="Calculate results">Calculate</button>

    <!-- Live region for screen readers -->
    <div id="output" aria-live="polite"></div>

</main>

<!-- JS file -->
<script src="script.js"></script>
</body>
</html>
